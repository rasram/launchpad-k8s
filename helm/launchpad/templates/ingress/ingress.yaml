{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: launchpad
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "launchpad.labels" . | nindent 4 }}
  annotations:
    # cert-manager issues TLS: letsencrypt-staging in dev/staging, letsencrypt-prod in prod.
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.clusterIssuer }}
    # Builds and deploys are slow — don't let nginx time out a long upstream response.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: launchpad-tls
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api/upload
            pathType: Prefix
            backend:
              service:
                name: upload-service
                port:
                  number: {{ .Values.uploadService.port }}
          - path: /api/deploy
            pathType: Prefix
            backend:
              service:
                name: deploy-service
                port:
                  number: {{ .Values.deployService.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: router-service
                port:
                  number: {{ .Values.routerService.port }}
{{- end }}
