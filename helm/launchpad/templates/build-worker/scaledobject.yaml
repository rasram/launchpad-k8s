{{- if .Values.buildWorker.keda.enabled }}
# ──────────────────────────────────────────────────────────────────────────────
# THE KEY DIFFERENTIATOR — KEDA ScaledObject (NOT a CPU HorizontalPodAutoscaler)
#
# We use KEDA instead of CPU-based HPA for build-worker because:
#   1. Build workers sit at 0–2% CPU even when 100 jobs are queued in Kafka —
#      they are I/O- and clone-bound, not CPU-bound. CPU is a meaningless signal here.
#   2. A CPU HPA would therefore never trigger: 500 jobs could pile up while the
#      autoscaler sees "2% CPU, nothing to do" and keeps a single pod.
#   3. Kafka consumer lag IS the correct scaling signal — it is literally the number
#      of pending build jobs. We scale 1 pod per `lagThreshold` pending jobs.
#   4. minReplicaCount: 0 gives true scale-to-zero — zero pods, zero cost when the
#      build queue is empty. Standard HPA cannot do this (it requires minReplicas >= 1).
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: build-worker-scaledobject
  namespace: {{ .Release.Namespace }}
  labels:
    app: build-worker
    {{- include "launchpad.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    name: build-worker
  minReplicaCount: {{ .Values.buildWorker.keda.minReplicaCount }}  # 0 — scale to zero at idle
  maxReplicaCount: {{ .Values.buildWorker.keda.maxReplicaCount }}  # 8 dev / 12 staging / 20 prod
  pollingInterval: {{ .Values.buildWorker.keda.pollingInterval }}  # how often KEDA checks lag (s)
  cooldownPeriod: {{ .Values.buildWorker.keda.cooldownPeriod }}    # wait before scaling back to 0 (s)
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: {{ .Values.kafka.bootstrapServers }}
        consumerGroup: {{ .Values.buildWorker.keda.consumerGroup }}
        topic: {{ .Values.buildWorker.keda.kafkaTopic }}
        lagThreshold: "{{ .Values.buildWorker.keda.lagThreshold }}"
        offsetResetPolicy: latest
{{- end }}
