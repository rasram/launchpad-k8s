name: commit-phase2c

on:
  schedule:
    - cron: "50 10 18 6 *"
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip if this commit already exists
        id: guard
        run: |
          if git log --oneline --fixed-strings --grep="feat(k8s): deploy and router service manifests with ingress" | grep -q .; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Commit already present — nothing to do."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create phase2c files
        if: steps.guard.outputs.skip == 'false'
        run: |
          mkdir -p helm/launchpad/templates helm/launchpad/templates/deploy-service helm/launchpad/templates/ingress helm/launchpad/templates/kafka helm/launchpad/templates/router-service
          cat > helm/launchpad/templates/deploy-service/deployment.yaml << 'LP_EOF_1'
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: deploy-service
            namespace: {{ .Release.Namespace }}
            labels:
              app: deploy-service
              {{- include "launchpad.labels" . | nindent 4 }}
          spec:
            replicas: {{ .Values.deployService.replicaCount }}
            selector:
              matchLabels:
                app: deploy-service
            template:
              metadata:
                labels:
                  app: deploy-service
                  {{- include "launchpad.labels" . | nindent 8 }}
              spec:
                containers:
                  - name: deploy-service
                    image: "{{ .Values.global.imageRegistry }}/{{ .Values.deployService.image.repository }}:{{ .Values.deployService.image.tag }}"
                    imagePullPolicy: IfNotPresent
                    ports:
                      - name: http
                        containerPort: {{ .Values.deployService.port }}
                    envFrom:
                      - configMapRef:
                          name: launchpad-config
                      - secretRef:
                          name: launchpad-secrets
                    readinessProbe:
                      httpGet:
                        path: /health
                        port: http
                      periodSeconds: 10
                      failureThreshold: 3
                    livenessProbe:
                      httpGet:
                        path: /health
                        port: http
                      periodSeconds: 30
                      failureThreshold: 3
                    resources:
                      {{- toYaml .Values.deployService.resources | nindent 12 }}
          LP_EOF_1
          cat > helm/launchpad/templates/deploy-service/service.yaml << 'LP_EOF_2'
          apiVersion: v1
          kind: Service
          metadata:
            name: deploy-service
            namespace: {{ .Release.Namespace }}
            labels:
              app: deploy-service
              {{- include "launchpad.labels" . | nindent 4 }}
          spec:
            type: ClusterIP
            selector:
              app: deploy-service
            ports:
              - name: http
                port: {{ .Values.deployService.port }}
                targetPort: http
          LP_EOF_2
          cat > helm/launchpad/templates/router-service/deployment.yaml << 'LP_EOF_3'
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: router-service
            namespace: {{ .Release.Namespace }}
            labels:
              app: router-service
              {{- include "launchpad.labels" . | nindent 4 }}
          spec:
            replicas: {{ .Values.routerService.replicaCount }}
            selector:
              matchLabels:
                app: router-service
            template:
              metadata:
                labels:
                  app: router-service
                  {{- include "launchpad.labels" . | nindent 8 }}
              spec:
                containers:
                  - name: router-service
                    image: "{{ .Values.global.imageRegistry }}/{{ .Values.routerService.image.repository }}:{{ .Values.routerService.image.tag }}"
                    imagePullPolicy: IfNotPresent
                    ports:
                      - name: http
                        containerPort: {{ .Values.routerService.port }}
                    envFrom:
                      - configMapRef:
                          name: launchpad-config
                      - secretRef:
                          name: launchpad-secrets
                    readinessProbe:
                      httpGet:
                        path: /health
                        port: http
                      periodSeconds: 10
                      failureThreshold: 3
                    livenessProbe:
                      httpGet:
                        path: /health
                        port: http
                      periodSeconds: 30
                      failureThreshold: 3
                    resources:
                      {{- toYaml .Values.routerService.resources | nindent 12 }}
                topologySpreadConstraints:
                  - maxSkew: 1
                    topologyKey: topology.kubernetes.io/zone
                    whenUnsatisfiable: ScheduleAnyway
                    labelSelector:
                      matchLabels:
                        app: router-service
          LP_EOF_3
          cat > helm/launchpad/templates/router-service/service.yaml << 'LP_EOF_4'
          apiVersion: v1
          kind: Service
          metadata:
            name: router-service
            namespace: {{ .Release.Namespace }}
            labels:
              app: router-service
              {{- include "launchpad.labels" . | nindent 4 }}
          spec:
            type: ClusterIP
            selector:
              app: router-service
            ports:
              - name: http
                port: {{ .Values.routerService.port }}
                targetPort: http
          LP_EOF_4
          cat > helm/launchpad/templates/kafka/kafka.yaml << 'LP_EOF_5'
          {{- if .Values.kafka.enabled }}
          # Strimzi KafkaTopic for the build-jobs queue. The Kafka cluster itself is
          # provisioned by the Strimzi operator (or the bundled bitnami subchart in dev);
          # this declares the topic whose consumer lag is KEDA's scaling signal.
          apiVersion: kafka.strimzi.io/v1beta2
          kind: KafkaTopic
          metadata:
            name: {{ .Values.buildWorker.keda.kafkaTopic }}
            namespace: {{ .Release.Namespace }}
            labels:
              strimzi.io/cluster: launchpad-kafka
              {{- include "launchpad.labels" . | nindent 4 }}
          spec:
            partitions: 3
            replicas: 1
            config:
              retention.ms: 604800000   # 7 days
          {{- end }}
          LP_EOF_5
          cat > helm/launchpad/templates/ingress/ingress.yaml << 'LP_EOF_6'
          {{- if .Values.ingress.enabled }}
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: launchpad
            namespace: {{ .Release.Namespace }}
            labels:
              {{- include "launchpad.labels" . | nindent 4 }}
            annotations:
              # cert-manager issues TLS: letsencrypt-staging in dev/staging, letsencrypt-prod in prod.
              cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.clusterIssuer }}
              # Builds and deploys are slow — don't let nginx time out a long upstream response.
              nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
              {{- with .Values.ingress.annotations }}
              {{- toYaml . | nindent 4 }}
              {{- end }}
          spec:
            ingressClassName: {{ .Values.ingress.className }}
            {{- if .Values.ingress.tls.enabled }}
            tls:
              - hosts:
                  - {{ .Values.ingress.host }}
                secretName: launchpad-tls
            {{- end }}
            rules:
              - host: {{ .Values.ingress.host }}
                http:
                  paths:
                    - path: /api/upload
                      pathType: Prefix
                      backend:
                        service:
                          name: upload-service
                          port:
                            number: {{ .Values.uploadService.port }}
                    - path: /api/deploy
                      pathType: Prefix
                      backend:
                        service:
                          name: deploy-service
                          port:
                            number: {{ .Values.deployService.port }}
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: router-service
                          port:
                            number: {{ .Values.routerService.port }}
          {{- end }}
          LP_EOF_6
          cat > helm/launchpad/templates/configmap.yaml << 'LP_EOF_7'
          # Non-secret application config, injected into every service via envFrom.
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: launchpad-config
            namespace: {{ .Release.Namespace }}
            labels:
              {{- include "launchpad.labels" . | nindent 4 }}
          data:
            ENVIRONMENT: {{ .Values.global.environment | quote }}
            LOG_LEVEL: {{ .Values.config.logLevel | quote }}
            KAFKA_BOOTSTRAP_SERVERS: {{ .Values.kafka.bootstrapServers | quote }}
            BUILD_JOBS_TOPIC: {{ .Values.buildWorker.keda.kafkaTopic | quote }}
            UPLOAD_SERVICE_URL: "http://upload-service:{{ .Values.uploadService.port }}"
            DEPLOY_SERVICE_URL: "http://deploy-service:{{ .Values.deployService.port }}"
            ROUTER_SERVICE_URL: "http://router-service:{{ .Values.routerService.port }}"
          LP_EOF_7
          cat > helm/launchpad/templates/secrets.yaml << 'LP_EOF_8'
          # Reference Secret for local/dev only. In staging/prod these keys are projected by
          # an external secrets manager (External Secrets Operator) — see DECISIONS.md.
          # Values are placeholders; real values never live in git.
          apiVersion: v1
          kind: Secret
          metadata:
            name: launchpad-secrets
            namespace: {{ .Release.Namespace }}
            labels:
              {{- include "launchpad.labels" . | nindent 4 }}
          type: Opaque
          stringData:
            REGISTRY_TOKEN: "changeme-registry-token"
            DATABASE_URL: "postgres://launchpad:changeme@launchpad-db:5432/launchpad"
          LP_EOF_8

      - name: Commit with scheduled date
        if: steps.guard.outputs.skip == 'false'
        env:
          GIT_AUTHOR_DATE: "2026-06-18T16:20:00+05:30"
          GIT_COMMITTER_DATE: "2026-06-18T16:20:00+05:30"
        run: |
          git config user.name "rasram"
          git config user.email "rasram@users.noreply.github.com"
          git add helm/launchpad/templates/deploy-service/deployment.yaml \
            helm/launchpad/templates/deploy-service/service.yaml \
            helm/launchpad/templates/router-service/deployment.yaml \
            helm/launchpad/templates/router-service/service.yaml \
            helm/launchpad/templates/kafka/kafka.yaml \
            helm/launchpad/templates/ingress/ingress.yaml \
            helm/launchpad/templates/configmap.yaml \
            helm/launchpad/templates/secrets.yaml
          git commit -m "feat(k8s): deploy and router service manifests with ingress"
          git push

      - name: Disable this workflow after success
        if: steps.guard.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow disable "commit-phase2c.yml" --repo "$GITHUB_REPOSITORY" || true
